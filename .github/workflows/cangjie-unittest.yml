name: cangjie-unittest

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Build & unit test (Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils libc-dev libc++-dev libgcc-11-dev \
            libssl-dev pkg-config ca-certificates

      - name: Locate Cangjie SDK
        id: sdk
        shell: bash
        env:
          CANGJIE_HOME: ${{ vars.CANGJIE_HOME || env.CANGJIE_HOME }}
          CANGJIE_SDK_TARBALL_URL: ${{ secrets.CANGJIE_SDK_TARBALL_URL }}
        run: |
          set -euo pipefail
          echo "CANGJIE_HOME=${CANGJIE_HOME:-<unset>}"
          echo "CANGJIE_SDK_TARBALL_URL=${CANGJIE_SDK_TARBALL_URL:-<unset>}"
          if [ -n "${CANGJIE_HOME:-}" ] && [ -x "${CANGJIE_HOME}/bin/cjc" ]; then
            echo "Using pre-installed SDK at ${CANGJIE_HOME}"
            echo "cangjie_home=${CANGJIE_HOME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${CANGJIE_SDK_TARBALL_URL:-}" ]; then
            echo "Downloading SDK from ${CANGJIE_SDK_TARBALL_URL}"
            mkdir -p "$RUNNER_TEMP/cangjie"
            curl -fsSL --retry 3 -o "$RUNNER_TEMP/cangjie/sdk.tar.gz" \
              "${CANGJIE_SDK_TARBALL_URL}"
            tar -xzf "$RUNNER_TEMP/cangjie/sdk.tar.gz" -C "$RUNNER_TEMP/cangjie"
            echo "Extracted tree:"
            find "$RUNNER_TEMP/cangjie" -maxdepth 2 -mindepth 1
            CANGJIE_HOME="$(find "$RUNNER_TEMP/cangjie" -mindepth 1 -maxdepth 3 -type d -name cangjie | head -n1)"
            if [ -z "${CANGJIE_HOME}" ]; then
              echo "::error::Could not locate cangjie/ under $RUNNER_TEMP/cangjie" >&2
              exit 1
            fi
            if [ ! -x "${CANGJIE_HOME}/tools/bin/cjc" ] && [ ! -x "${CANGJIE_HOME}/bin/cjc" ]; then
              echo "::error::Found ${CANGJIE_HOME} but no cjc under tools/bin/ or bin/" >&2
              exit 1
            fi
            echo "cangjie_home=${CANGJIE_HOME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::No Cangjie SDK available. Set the CANGJIE_HOME variable," \
               "or the CANGJIE_SDK_TARBALL_URL secret pointing to a public tarball." >&2
          exit 1

      - name: Activate SDK environment
        shell: bash
        run: |
          set -eo pipefail
          CANGJIE_HOME="${{ steps.sdk.outputs.cangjie_home }}"
          if [ -f "${CANGJIE_HOME}/envsetup.sh" ]; then
            source "${CANGJIE_HOME}/envsetup.sh"
          fi
          echo "CANGJIE_HOME=${CANGJIE_HOME}" >> "$GITHUB_ENV"
          echo "${CANGJIE_HOME}/bin" >> "$GITHUB_PATH"
          if [ -d "${CANGJIE_HOME}/tools/bin" ]; then
            echo "${CANGJIE_HOME}/tools/bin" >> "$GITHUB_PATH"
          fi
          cjc -v
          cjpm --version

      - name: Build
        run: cjpm build

      - name: Run unit tests
        run: |
          set -o pipefail
          cjpm test

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cjpm-test-log
          path: |
            target/**/*.log
            target/test*
            target/release/test*
          if-no-files-found: ignore
